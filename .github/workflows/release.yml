name: Build Unsigned Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  build-unsigned:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build browser bundles
      run: node scripts/build.js

    - name: Convert Safari bundle to an Xcode project
      run: |
        xcrun safari-web-extension-converter dist/safari \
          --project-location dist/safari-xcode \
          --app-name "redirecttube" \
          --bundle-identifier eu.stankiewiczm.redirecttube \
          --macos-only --no-open --force

    - name: Extract data from manifest.json
      run: |
        VERSION=$(jq -r '.version' src/browser/manifest.gecko.json)
        ID=$(jq -r '.browser_specific_settings.gecko.id' src/browser/manifest.gecko.json)
        GECKO_PACKAGE=$(find dist/packages -maxdepth 1 -type f -name "*-${VERSION}-gecko-unsigned.xpi" -print -quit)
        if [ -z "$GECKO_PACKAGE" ]; then
          echo "Unable to locate gecko package for version ${VERSION}" >&2
          exit 1
        fi
        BASENAME=$(basename "$GECKO_PACKAGE")
        SAFE_NAME="${BASENAME%-${VERSION}-gecko-unsigned.xpi}"
        echo "EXT_NAME=${SAFE_NAME}" >> $GITHUB_ENV
        echo "EXT_VERSION=${VERSION}" >> $GITHUB_ENV
        echo "EXT_ID=${ID}" >> $GITHUB_ENV

    - name: Prepare artifacts directories
      run: |
        mkdir -p artifacts/unsigned

    - name: Copy unsigned packages
      run: |
        cp dist/packages/${EXT_NAME}-${EXT_VERSION}-gecko-unsigned.xpi artifacts/unsigned/
        cp dist/packages/${EXT_NAME}-${EXT_VERSION}-chromium-unsigned.zip artifacts/unsigned/

    - name: Package Safari Xcode project
      run: |
        (cd dist/safari-xcode && zip -qr "../../artifacts/unsigned/${EXT_NAME}-${EXT_VERSION}-safari-xcode-unsigned.zip" .)

    - name: Generate tag and release name
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        YEAR=$(date +'%y')
        MONTH=$(date +'%m')
        RELEASE_COUNT=$(curl -s \
          -H "Authorization: Bearer $GH_TOKEN" \
          https://api.github.com/repos/${{ github.repository }}/releases \
          | jq "[.[] | select(.tag_name | startswith(\"${YEAR}${MONTH}\"))] | length + 1")
        TAG="${YEAR}${MONTH}$(printf "%0${#RELEASE_COUNT}d" ${RELEASE_COUNT})"
        RELEASE_NAME="${EXT_VERSION} (${TAG})"
        echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV
        echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV

    - name: Upload unsigned bundle for follow-up workflows
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-output
        path: artifacts/unsigned

    - name: Persist release metadata
      run: |
        printf "EXT_NAME=%q\n" "$EXT_NAME" > release-metadata.env
        {
          printf "EXT_VERSION=%q\n" "$EXT_VERSION"
          printf "EXT_ID=%q\n" "$EXT_ID"
          printf "RELEASE_TAG=%q\n" "$RELEASE_TAG"
        } >> release-metadata.env

    - name: Upload release metadata
      uses: actions/upload-artifact@v4
      with:
        name: release-metadata
        path: release-metadata.env

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "$RELEASE_TAG" \
          ./artifacts/unsigned/${EXT_NAME}-${EXT_VERSION}-gecko-unsigned.xpi \
          ./artifacts/unsigned/${EXT_NAME}-${EXT_VERSION}-chromium-unsigned.zip \
          ./artifacts/unsigned/${EXT_NAME}-${EXT_VERSION}-safari-xcode-unsigned.zip \
          --title "$RELEASE_NAME" \
          --notes-file ./release-notes.md