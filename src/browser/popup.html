<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="popup.page.title">RedirectTube</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div id="title">
            <img class="logo browser-light" src="img/logo_default.png" alt="RedirectTube">
            <img class="logo browser-dark" src="img/logo_light.png" alt="RedirectTube">
        </div>
    <div id="content">
        <button id="redirectButton" class="primary" data-i18n="ui.button.redirect">Open this site in FreeTube</button>
        <button id="optionsButton" data-i18n="ui.button.options">Options</button>
        <button id="opinionButton" data-i18n="ui.button.opinion">Give your opinion</button>
        <button id="suggestionButton" data-i18n="ui.button.suggestion">Make a suggestion</button>
        <button id="issueButton" data-i18n="ui.button.issue">Report an issue</button>
    </div>
    <p id="errorText"></p>
    <footer>
        <p data-i18n="ui.createdby">Created with ❤️ by <a href="https://www.stankiewiczm.eu" target="_blank">Michał Stankiewicz</a></p>
        <p><a href="https://github.com/stankiewiczmichal/RedirectTube">GitHub</a> • <a href="https://fosstodon.org/@mstankiewicz">Mastodon</a></p>
    </footer>
    <script src="shared.js"></script>
    <script src="i18n/translate.js"></script>
    <script src="popup.js"></script>
</body>
</html>
